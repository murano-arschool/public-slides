<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides — arschool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F5F0; --ink:#181A20; --blue:#2B49FF;
    --yellow:#FFD23F; --gray:#878C96; --line:#D8D6CE;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);background:var(--paper);
       min-height:100vh;padding:80px 24px;line-height:1.7;}
  .wrap{max-width:780px;margin:0 auto;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  header{margin-bottom:56px;}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--blue);
          letter-spacing:.08em;margin-bottom:14px;}
  h1{font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:48px;line-height:1.3;}
  .lead{margin-top:18px;font-size:17px;color:#4A4E58;}

  .deck{display:block;text-decoration:none;color:inherit;background:#fff;
        border:1px solid var(--line);border-radius:16px;padding:30px 34px;margin-bottom:20px;
        transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;}
  .deck:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(24,26,32,.10);border-color:var(--blue);}
  .deck .date{font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--blue);letter-spacing:.04em;}
  .deck .title{font-family:'Shippori Mincho B1',serif;font-weight:700;font-size:27px;
               line-height:1.45;margin-top:8px;}
  .deck .sub{margin-top:10px;font-size:15px;color:var(--gray);}
  .deck .go{margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--ink);
            display:inline-flex;align-items:center;gap:8px;}
  .deck .go::after{content:'→';color:var(--blue);}

  footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--line);
          font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gray);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">arschool / slides</div>
    <h1>スライド一覧</h1>
    <p class="lead">登壇・説明用スライドの公開ページです。各デッキはキーボード（→／←）またはリモコンで操作します。</p>
  </header>

  <main>
    <a class="deck" href="coeteco20260615/">
      <div class="date">2026.06.15 — コエテコEXPO 2026</div>
      <div class="title">バイブコーディングで、子どもの学びはどう変わるのか</div>
      <div class="sub">アルスクール株式会社　代表　村野 智浩</div>
      <span class="go">スライドを開く</span>
    </a>
  </main>

  <footer>arschool / vibe-coding &nbsp;·&nbsp; built with plain HTML</footer>
</div>
</body>
</html>
